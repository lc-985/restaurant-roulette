<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Roulette</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="shortcut icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2a2a2a;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 80px;
  }

  /* ── Receipt wrapper — gives the torn paper top/bottom ── */
  .receipt-wrap {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  }

  /* Torn top edge */
  .tear-top {
    width: 100%;
    height: 10px;
    background: #fafaf5;
    clip-path: polygon(
      0% 100%, 1.5% 20%, 3% 100%, 4.5% 20%, 6% 100%, 7.5% 20%,
      9% 100%, 10.5% 20%, 12% 100%, 13.5% 20%, 15% 100%, 16.5% 20%,
      18% 100%, 19.5% 20%, 21% 100%, 22.5% 20%, 24% 100%, 25.5% 20%,
      27% 100%, 28.5% 20%, 30% 100%, 31.5% 20%, 33% 100%, 34.5% 20%,
      36% 100%, 37.5% 20%, 39% 100%, 40.5% 20%, 42% 100%, 43.5% 20%,
      45% 100%, 46.5% 20%, 48% 100%, 49.5% 20%, 51% 100%, 52.5% 20%,
      54% 100%, 55.5% 20%, 57% 100%, 58.5% 20%, 60% 100%, 61.5% 20%,
      63% 100%, 64.5% 20%, 66% 100%, 67.5% 20%, 69% 100%, 70.5% 20%,
      72% 100%, 73.5% 20%, 75% 100%, 76.5% 20%, 78% 100%, 79.5% 20%,
      81% 100%, 82.5% 20%, 84% 100%, 85.5% 20%, 87% 100%, 88.5% 20%,
      90% 100%, 91.5% 20%, 93% 100%, 94.5% 20%, 96% 100%, 97.5% 20%,
      99% 100%, 100% 20%, 100% 100%
    );
  }

  /* Main receipt body */
  .receipt {
    background: #fafaf5;
    padding: 0 24px;
    position: relative;
  }

  /* Subtle paper texture via repeating noise */
  .receipt::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.015) 2px,
      rgba(0,0,0,0.015) 3px
    );
    pointer-events: none;
  }

  /* ── Receipt header ── */
  .receipt-header {
    text-align: center;
    padding: 20px 0 14px;
    border-bottom: 1px dashed rgba(0,0,0,0.2);
    margin-bottom: 14px;
  }

  .receipt-logo {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 6px;
  }

  .receipt-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .receipt-title span {
    display: block;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: #555;
    margin-top: 2px;
  }

  .receipt-meta {
    font-size: 10px;
    color: #aaa;
    letter-spacing: 0.08em;
    margin-top: 8px;
  }

  /* ── Receipt row ── */
  .r-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: #444;
    padding: 1.5px 0;
    letter-spacing: 0.04em;
  }
  .r-row .r-label { flex: 1; }
  .r-row .r-val { flex-shrink: 0; color: #1a1a1a; }

  /* ── Section label ── */
  .r-section {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #bbb;
    padding: 10px 0 4px;
  }

  /* ── Dashed divider ── */
  .r-dash {
    border: none;
    border-top: 1px dashed rgba(0,0,0,0.18);
    margin: 10px 0;
  }

  /* ── The Pick zone ── */
  .pick-zone {
    margin: 4px 0 10px;
    padding: 12px 14px;
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Receipt thermal print effect on winner */
  .pick-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(255,255,255,0.03) 3px,
      rgba(255,255,255,0.03) 4px
    );
    pointer-events: none;
  }

  .pick-idle {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    letter-spacing: 0.1em;
    padding: 4px 0;
  }

  .pick-label {
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: center;
    margin-bottom: 4px;
  }

  .pick-name {
    font-size: 26px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #ffffff;
    text-align: center;
    line-height: 1.1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Shuffling names during animation */
  .pick-shuffling {
    font-size: 16px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── Shuffle button ── */
  .shuffle-btn {
    display: block;
    width: 100%;
    padding: 11px;
    background: transparent;
    border: 1px dashed rgba(0,0,0,0.25);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    margin: 0 0 10px;
    position: relative;
  }
  .shuffle-btn:hover {
    background: #1a1a1a;
    color: #fafaf5;
    border-color: #1a1a1a;
  }
  .shuffle-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Restaurant list ── */
  .rest-item {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 3px 0;
  }
  .rest-idx {
    font-size: 10px;
    color: #bbb;
    min-width: 22px;
    flex-shrink: 0;
  }
  .rest-name {
    flex: 1;
    font-size: 12px;
    color: #1a1a1a;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rest-del {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    padding: 0 0 0 8px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .rest-del:hover { color: #1a1a1a; }
  .empty-note {
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 6px 0;
  }

  /* ── Add form ── */
  .add-row {
    display: flex;
    gap: 0;
    margin-bottom: 6px;
  }
  .f-input {
    flex: 1;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    color: #1a1a1a;
    padding: 6px 0;
    outline: none;
    text-transform: uppercase;
    transition: border-color 0.15s;
  }
  .f-input:focus { border-color: #1a1a1a; }
  .f-input::placeholder { color: #ccc; text-transform: none; letter-spacing: 0.04em; }
  .f-add-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none;
    border: none;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    color: #888;
    padding: 6px 0 6px 12px;
    cursor: pointer;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .f-add-btn:hover { color: #1a1a1a; }

  /* ── Footer ── */
  .receipt-footer {
    text-align: center;
    padding: 14px 0 20px;
    margin-top: 14px;
  }
  .receipt-footer-text {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ccc;
    line-height: 1.8;
  }
  .clear-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    transition: color 0.15s;
    margin-top: 4px;
    display: inline-block;
  }
  .clear-btn:hover { color: #1a1a1a; }

  /* Barcode */
  .barcode {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 1.5px;
    height: 32px;
    margin: 12px 0 6px;
  }
  .barcode-bar {
    background: #1a1a1a;
    width: 2px;
  }

  /* Torn bottom edge */
  .tear-bottom {
    width: 100%;
    height: 10px;
    background: #fafaf5;
    clip-path: polygon(
      0% 0%, 1.5% 80%, 3% 0%, 4.5% 80%, 6% 0%, 7.5% 80%,
      9% 0%, 10.5% 80%, 12% 0%, 13.5% 80%, 15% 0%, 16.5% 80%,
      18% 0%, 19.5% 80%, 21% 0%, 22.5% 80%, 24% 0%, 25.5% 80%,
      27% 0%, 28.5% 80%, 30% 0%, 31.5% 80%, 33% 0%, 34.5% 80%,
      36% 0%, 37.5% 80%, 39% 0%, 40.5% 80%, 42% 0%, 43.5% 80%,
      45% 0%, 46.5% 80%, 48% 0%, 49.5% 80%, 51% 0%, 52.5% 80%,
      54% 0%, 55.5% 80%, 57% 0%, 58.5% 80%, 60% 0%, 61.5% 80%,
      63% 0%, 64.5% 80%, 66% 0%, 67.5% 80%, 69% 0%, 70.5% 80%,
      72% 0%, 73.5% 80%, 75% 0%, 76.5% 80%, 78% 0%, 79.5% 80%,
      81% 0%, 82.5% 80%, 84% 0%, 85.5% 80%, 87% 0%, 88.5% 80%,
      90% 0%, 91.5% 80%, 93% 0%, 94.5% 80%, 96% 0%, 97.5% 80%,
      99% 0%, 100% 80%, 100% 0%
    );
  }

  /* ── Confetti ── */
  .cfwrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .cfp { position: absolute; top: -12px; animation: cfall linear forwards; }
  @keyframes cfall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(580deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="receipt-wrap">

  <div class="tear-top"></div>

  <div class="receipt">

    <!-- Header -->
    <div class="receipt-header">
      <div class="receipt-logo">* * * * * * * * * *</div>
      <div class="receipt-title">
        Restaurant<br>Roulette
        <span>Where do we eat?</span>
      </div>
      <div class="receipt-meta" id="receipt-date"></div>
    </div>

    <!-- Order details -->
    <div class="r-section">Order details</div>
    <div class="r-row"><span class="r-label">Table no.</span><span class="r-val">--</span></div>
    <div class="r-row"><span class="r-label">Guests</span><span class="r-val">--</span></div>
    <div class="r-row"><span class="r-label">Hunger level</span><span class="r-val">HIGH</span></div>
    <div class="r-row"><span class="r-label">Decisiveness</span><span class="r-val">NONE</span></div>

    <hr class="r-dash">

    <!-- The Pick -->
    <div class="r-section">Tonight's selection</div>

    <div class="pick-zone" id="pick-zone">
      <div class="pick-idle">[ press shuffle to pick ]</div>
    </div>

    <hr class="r-dash">

    <!-- Restaurant list -->
    <div class="r-section">Your restaurants</div>
    <div id="rest-list"></div>

    <div class="add-row">
      <input class="f-input" id="inp" placeholder="Add a restaurant...">
      <button class="f-add-btn" id="f-add-btn">+ add</button>
    </div>

    <button class="shuffle-btn" id="shuffle-btn" style="margin-top:10px;">[ shuffle ]</button>

    <!-- Footer -->
    <div class="receipt-footer">
      <div class="barcode" id="barcode"></div>
      <div class="receipt-footer-text">
        Thank you for dining in<br>
        * no refunds on bad choices *
      </div>
      <button class="clear-btn" id="clear-btn">[ void all items ]</button>
    </div>

  </div>

  <div class="tear-bottom"></div>

</div>

<div class="cfwrap" id="cfwrap"></div>

<script>
  let restaurants = JSON.parse(localStorage.getItem('rrReceipt') || '[]');
  let shuffling = false;

  // Set date
  const now = new Date();
  document.getElementById('receipt-date').textContent =
    now.toLocaleDateString('en-CA') + '  ' +
    now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'});

  // Generate random barcode bars
  const bc = document.getElementById('barcode');
  const heights = [32,18,28,14,32,22,28,18,32,14,26,32,18,22,32,14,28,22,32,18,26,14,32,28,18,32,22,14,26,32];
  heights.forEach(h => {
    const b = document.createElement('div');
    b.className = 'barcode-bar';
    b.style.height = h + 'px';
    bc.appendChild(b);
  });

  function save() { localStorage.setItem('rrReceipt', JSON.stringify(restaurants)); }

  function renderList() {
    const el = document.getElementById('rest-list');
    if (!restaurants.length) {
      el.innerHTML = '<div class="empty-note">-- no items --</div>';
      return;
    }
    el.innerHTML = restaurants.map((r, i) => `
      <div class="rest-item">
        <span class="rest-idx">${String(i+1).padStart(2,'0')}.</span>
        <div class="rest-name">${r.name}</div>
        <button class="rest-del" onclick="del(${i})">[x]</button>
      </div>`).join('');
  }

  function del(i) {
    restaurants.splice(i, 1);
    save(); renderList(); resetPick();
  }

  function resetPick() {
    document.getElementById('pick-zone').innerHTML = '<div class="pick-idle">[ press shuffle to pick ]</div>';
    document.getElementById('shuffle-btn').textContent = '[ shuffle ]';
  }

  document.getElementById('clear-btn').addEventListener('click', () => {
    if (!restaurants.length) return;
    restaurants = [];
    save(); renderList(); resetPick();
  });

  document.getElementById('f-add-btn').addEventListener('click', addR);
  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') addR();
  });

  function addR() {
    const name = document.getElementById('inp').value.trim();
    if (!name) { document.getElementById('inp').focus(); return; }
    restaurants.push({ name });
    save(); renderList();
    document.getElementById('inp').value = '';
    document.getElementById('inp').focus();
    resetPick();
  }

  document.getElementById('shuffle-btn').addEventListener('click', () => {
    if (shuffling || !restaurants.length) return;
    shuffling = true;
    document.getElementById('shuffle-btn').disabled = true;

    const picked = restaurants[Math.floor(Math.random() * restaurants.length)];
    const names = restaurants.map(r => r.name);
    const zone = document.getElementById('pick-zone');
    const totalFlips = 18;
    let count = 0;

    function tick() {
      if (count >= totalFlips) {
        zone.innerHTML = `<div class="pick-name">${picked.name}</div>`;
        shuffling = false;
        document.getElementById('shuffle-btn').disabled = false;
        document.getElementById('shuffle-btn').textContent = '[ shuffle again ]';
        fireConfetti();
        return;
      }
      const n = names[Math.floor(Math.random() * names.length)];
      zone.innerHTML = `<div class="pick-shuffling">${n}</div>`;
      count++;
      setTimeout(tick, count < 10 ? 80 : count < 15 ? 120 : 180);
    }
    tick();
  });

  function fireConfetti() {
    const wrap = document.getElementById('cfwrap');
    const cols = ['#1a1a1a', '#fafaf5', '#888', '#444', '#ddd', '#ffffff'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'cfp';
      const s = 3 + Math.random() * 7;
      const tall = Math.random() > 0.5;
      p.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${tall?s*3:s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:1px;animation-duration:${2+Math.random()*1.5}s;animation-delay:${Math.random()*0.4}s;`;
      wrap.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }
  }

  renderList();
</script>
</body>
</html>
